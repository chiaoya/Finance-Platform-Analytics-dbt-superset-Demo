version: 2

models:
  - name: stg_loans
    description: "Cleaned loan staging model"
    columns:
      - name: id
        description: "Loan identifier"
        tests:
          - not_null

      - name: grade
        description: "Credit grade"
        tests:
          - not_null

      - name: loan_status
        description: "Loan status"
        tests:
          - not_null

  - name: stg_rejected_loans
    description: "Cleaned rejected application staging model"
    columns:
      - name: amount_requested
        description: "Requested amount for the rejected application"
      - name: application_date
        description: "Rejected application submission date"
        tests:
          - not_null

      - name: state
        description: "Applicant state"
        tests:
          - not_null
