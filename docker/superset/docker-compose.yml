services:
  superset:
    build: .
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: supersecretkey
    volumes:
      - superset_home:/app/superset_home
    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade
        superset fab create-admin \
          --username admin \
          --firstname admin \
          --lastname admin \
          --email admin@superset.com \
          --password admin || true
        superset init
        superset run -h 0.0.0.0 -p 8088 --with-threads

volumes:
  superset_home: