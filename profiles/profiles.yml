# Sample dbt profiles.yml for local testing (DO NOT COMMIT real credentials)
# Put this file at ./profiles/profiles.yml and customize the values.
# This project is standardized on the single Postgres database `platform_demo`.

platform_demo_project:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres        # use localhost when running dbt from the host venv
      user: postgres
      password: postgres
      port: 5432
      dbname: platform_demo
      schema: analytics     # change to the schema you want dbt to use
      threads: 1
